version: 2.1

orbs:
  python: circleci/python@4.0.0

jobs:
  test:
    parameters:
      python-version:
        type: string
    docker:
      - image: cimg/python:<< parameters.python-version >>
    resource_class: small
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: uv
          args: --python << parameters.python-version >>
      - run: uv run ruff check
      - run: uv run pyrefly check
      - run: uv run pytest

  render-test:
    docker:
      - image: texlive/texlive:latest-small
    resource_class: small
    environment:
      TEXMFHOME: /root/texmf
    steps:
      - checkout
      - restore_cache:
          keys:
            - texmf-v1-{{ checksum ".circleci/texlive-packages.txt" }}
            - texmf-v1-
      - run:
          name: Install LaTeX packages via tlmgr
          command: |
            REPO=https://mirror.ox.ac.uk/sites/ctan.org/systems/texlive/tlnet
            [ -d /root/texmf ] || tlmgr --repository "$REPO" init-usertree
            tlmgr --repository "$REPO" --usermode --usertree /root/texmf install $(cat .circleci/texlive-packages.txt)
      - save_cache:
          key: texmf-v1-{{ checksum ".circleci/texlive-packages.txt" }}
          paths:
            - /root/texmf
      - run:
          name: Install diff-pdf and curl
          command: |
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends diff-pdf-wx ca-certificates curl
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
            echo 'export PATH=$HOME/.local/bin:$PATH' >> "$BASH_ENV"
      - restore_cache:
          keys:
            - uv-v1-{{ checksum "uv.lock" }}
            - uv-v1-
      - run: uv sync
      - save_cache:
          key: uv-v1-{{ checksum "uv.lock" }}
          paths:
            - /root/.cache/uv
      - run: uv run pytest -m render
      - store_artifacts:
          path: tests/_artifacts

  publish:
    docker:
      - image: cimg/python:3.14
    resource_class: small
    steps:
      - checkout
      - run: uv build
      - run: uv publish

  release:
    docker:
      - image: cimg/node:lts
    resource_class: small
    steps:
      - checkout
      - run: npx -y -p semantic-release@25.0.3 -p conventional-changelog-conventionalcommits@9.3.1 semantic-release

workflows:
  ci:
    jobs:
      - test:
          matrix:
            parameters:
              python-version: ["3.11", "3.14"]
      - render-test
      - release:
          requires:
            - test
            - render-test
          filters:
            branches:
              only: main
  cd:
    jobs:
      - test:
          matrix:
            parameters:
              python-version: ["3.11", "3.14"]
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
      - render-test:
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
      - publish:
          context: pypi-public
          requires:
            - test
            - render-test
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
